<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12182B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0F1C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glass surface gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner glow for glass effect -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" rx="224" ry="224"/>
  
  <!-- Outer subtle glow ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="rgba(52,211,153,0.15)" stroke-width="4"/>
  
  <!-- Main glass circle -->
  <circle cx="512" cy="512" r="320" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  
  <!-- Inner glass circle (elevated) -->
  <circle cx="512" cy="512" r="240" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Shield/Guardian icon background glow -->
  <circle cx="512" cy="512" r="160" fill="rgba(52,211,153,0.1)" filter="url(#glow)"/>
  
  <!-- Shield shape -->
  <path d="M512 380 
           C512 380, 640 420, 640 520 
           C640 620, 512 680, 512 680 
           C512 680, 384 620, 384 520 
           C384 420, 512 380, 512 380 Z" 
        fill="url(#accentGrad)" 
        filter="url(#glow)"/>
  
  <!-- Clock hands inside shield -->
  <line x1="512" y1="512" x2="512" y2="450" stroke="#0A0F1C" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="556" y2="544" stroke="#0A0F1C" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Clock center dot -->
  <circle cx="512" cy="512" r="10" fill="#0A0F1C"/>
  
  <!-- Clock ticks -->
  <line x1="512" y1="400" x2="512" y2="412" stroke="#0A0F1C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="624" x2="512" y2="612" stroke="#0A0F1C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="400" y1="512" x2="412" y2="512" stroke="#0A0F1C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="624" y1="512" x2="612" y2="512" stroke="#0A0F1C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>